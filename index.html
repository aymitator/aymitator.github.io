<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8">
<title>Do Games Along Me</title>

  <script>
  var d = document;
function go(_s){
return d.getElementById(_s);
}
  function gametime(){
var game1 = go("game1").checked;
var game1_online = go("game1_online").checked;
var out = go("myresult");
if(game1 === !true && game1_online === true){
alert("you can't do game online unless you allow game");
return;
}
if(game1 && game1_online === !true){
out.innerHTML = "Hey mrgamble, you should do Dead Rising III";
return;
}
if(game1 && game1_online){
out.innerHTML = "Hey mrgamble, you should get Dead Rising III und we should/ought to game along each us";
return;
}
if(game1 === !true && game1_online === !true){
out.innerHTML = "Hey mrgamble, don't  do any games";
return;
}
}
</script>
</head>

  <body>
    <h1>Game Along Me 🎮</h1>
    <h2>der Unlicense licensed</h2>
<p>
What games should mrgamble do?<br>
<input type="checkbox" id="game1"> 
Dead Rising III
<input type="checkbox" id="game1_online"> online
</p>
<p>
<input type="button" value="submit"
onclick="gametime()" />
</p>

</p>
